# deprecations.yaml
# Canonical registry of all deprecated interfaces in Multi Factor.
#
# Fields:
#   id            : unique identifier
#   kind          : module | script | function | class | parameter
#   target        : deprecated path / symbol
#   replacement   : what to use instead
#   warn_since    : version when DeprecationWarning was first emitted
#   remove_in     : planned removal version
#   migration_note: one-line human migration hint
#   warn_template : key tokens that must appear in the emitted warning message

schema_version: "1.0"
generated: "2026-04-11"

